---
aid: codesandbox
name: CodeSandbox
description: >-
  CodeSandbox is a browser-based development environment platform that enables
  developers to create, share, and collaborate on interactive coding sandboxes
  instantly in the browser. The platform provides a cloud-based IDE with
  Firecracker microVM infrastructure that supports snapshotting, cloning, and
  running isolated development environments at scale. CodeSandbox offers the
  CodeSandbox SDK for programmatically spinning up AI sandboxes and development
  environments, the Sandpack component toolkit for embedding live-running code
  editing experiences, and a browser sandbox Define API for generating sandboxes
  on the fly from code examples. Trusted by over 4.5 million developers monthly,
  it serves individual developers, professional teams, and AI product builders
  needing concurrent sandboxed environments.
type: Index
