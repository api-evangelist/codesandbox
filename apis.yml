specificationVersion: '0.19'
apis:
  - aid: codesandbox:sdk
    name: CodeSandbox SDK API
    description: >-
      The CodeSandbox SDK provides programmatic access to spin up isolated
      Firecracker microVM-backed development environments and run untrusted code
      securely. It supports VM snapshotting and cloning in under 2 seconds,
      terminal and shell access, container support via Dockerfile, and Git/GitHub
      integration. Authenticated via API key token obtained from
      codesandbox.io/t/api and provided as CSB_API_KEY environment variable.
    humanURL: https://codesandbox.io/docs/sdk
    baseURL: https://api.codesandbox.io
    tags:
      - SDK
      - Virtual Machines
      - AI Sandboxes
      - Code Execution
    properties:
      - type: Documentation
        url: https://codesandbox.io/docs/sdk
      - type: GitHubRepository
        url: https://github.com/codesandbox/codesandbox-sdk
  - aid: codesandbox:define-api
    name: CodeSandbox Define API
    description: >-
      The Define API allows programmatic creation of browser sandboxes from code
      files, useful for documentation sites and code examples that need to
      generate a sandbox on the fly. Supports both GET and POST requests to
      https://codesandbox.io/api/v1/sandboxes/define, accepting a files
      parameter containing the sandbox file structure and returning either a
      rendered sandbox or JSON with sandbox_id when using the ?json=1 query
      parameter.
    humanURL: https://codesandbox.io/docs/learn/browser-sandboxes/cli-api
    baseURL: https://codesandbox.io/api/v1
    tags:
      - Browser Sandboxes
      - REST API
      - Code Examples
    properties:
      - type: Documentation
        url: https://codesandbox.io/docs/learn/browser-sandboxes/cli-api
  - aid: codesandbox:sandpack
    name: Sandpack Embed Toolkit
    description: >-
      Sandpack is an open-source component toolkit for creating live-running code
      editing experiences powered by CodeSandbox. It supports React via
      @codesandbox/sandpack-react and plain JavaScript via
      @codesandbox/sandpack-client, enabling developers to embed interactive code
      editors and previews with built-in support for Next.js, Remix, Vite, Astro,
      hot module reloading, and npm dependency support. Also supports iframe-based
      sandbox embedding.
    humanURL: https://sandpack.codesandbox.io/docs
    tags:
      - Embedding
      - Code Editor
      - React
      - JavaScript
      - Component Toolkit
    properties:
      - type: Documentation
        url: https://sandpack.codesandbox.io/docs
      - type: GitHubRepository
        url: https://github.com/codesandbox/sandpack
