principles:
  - name: Visibility
    description: >-
      Track CodeSandbox VM credit consumption monthly per workspace to
      understand development environment costs across teams and projects.
  - name: Optimization
    description: >-
      Right-size VM specs to workload requirements; shut down idle sandboxes
      promptly since billing rounds up to the nearest minute; prefer snapshot
      and restore over leaving VMs running to minimize runtime costs.
  - name: Accountability
    description: >-
      Assign workspace credits per team or project; use workspace-level
      billing to attribute costs to individual teams or product lines.
  - name: Forecasting
    description: >-
      Model monthly spend based on average VM hours per developer and
      concurrent VM peaks; scale plan tier selection to expected usage to
      avoid high on-demand overage rates.
